name: Kuk Calendar keystore

# One-off: generate a STABLE Play-Store upload keystore for com.kuklabs.calendar.
# Run it once (Actions → "Kuk Calendar keystore" → Run workflow), download the
# artifact, then add these four repo secrets (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64   = contents of kukcalendar.keystore.b64
#   ANDROID_KEYSTORE_PASSWORD = the password from keystore-password.txt
#   ANDROID_KEY_ALIAS         = kukcalendar
#   ANDROID_KEY_PASSWORD      = same password
# Keep the artifact safe (it IS your upload key) and delete it from Actions
# after storing the secrets. Losing it means resetting the upload key with
# Google Play support.
on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Generate keystore + fingerprints
        run: |
          PASS="$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)"
          keytool -genkeypair -dname "cn=Kuk Calendar, o=Kuklabs, c=US" -alias kukcalendar \
            -keystore kukcalendar.keystore -storepass "$PASS" -keypass "$PASS" \
            -keyalg RSA -keysize 2048 -validity 10000
          keytool -list -v -keystore kukcalendar.keystore -storepass "$PASS" -alias kukcalendar \
            | grep -E "SHA1:|SHA256:" | tee fingerprints.txt
          base64 -w0 kukcalendar.keystore > kukcalendar.keystore.b64
          echo "$PASS" > keystore-password.txt
      - uses: actions/upload-artifact@v4
        with:
          name: kukcalendar-keystore
          path: |
            kukcalendar.keystore.b64
            keystore-password.txt
            fingerprints.txt
          if-no-files-found: error
