name: kukcalendar
description: Kuk Calendar — a standalone personal calendar that syncs with your KukLabs account.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.8.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  dio: ^5.4.3+1
  uuid: ^4.3.3
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# App launcher icon (the KukLabs "K"). Generated in CI via:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+): the mark is pre-padded into the safe zone
  # (assets/icon_fg.png ≈ 64% centered on transparent) so it never clips, on a
  # clean white background.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_fg.png"
