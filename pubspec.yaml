name: kukcalendar
description: Kuk Calendar — a standalone personal calendar that syncs with your KukLabs account.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.8.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  dio: ^5.4.3+1
  uuid: ^4.3.3

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
